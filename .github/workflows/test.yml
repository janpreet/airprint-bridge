name: test

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

# Least privilege: this workflow only reads the repo and runs tests, it
# never needs to write anything back.
permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: shellcheck setup.sh docker-entrypoint.sh tests/docker/test.sh tests/helm/test.sh

  script-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install bats
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq bats
      - run: bats tests/script/setup_test.bats

  docker-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: bash tests/docker/test.sh

  helm-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: azure/setup-helm@v4
        with:
          version: "v3.15.2"
      - run: bash tests/helm/test.sh
